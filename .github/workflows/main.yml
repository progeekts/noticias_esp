name: Enviar Noticias Diarias
on:
  schedule:
    - cron: '0 9 * * *' # Se ejecuta a las 10:00 o 11:00 AM en España (9 AM UTC)
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Acelera las ejecuciones futuras guardando las librerías

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Ejecutar script
        env:
          # Ya no necesitas NEWS_API_KEY para RSS, pero puedes dejarla si quieres
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Forzamos Node 24 para evitar el aviso de depreciación de tus logs anteriores
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
        run: python noticias.py
