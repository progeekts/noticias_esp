name: Enviar Noticias Diarias
on:
  schedule:
    # Horarios UTC (España es UTC+1 o UTC+2 en verano)
    # 08:00 UTC = 09:00/10:00 ESP
    # 13:00 UTC = 14:00/15:00 ESP
    # 19:00 UTC = 20:00/21:00 ESP
    - cron: '0 8,13,19 * * *'
  workflow_dispatch: 

permissions:
  contents: write # Permiso necesario para guardar la memoria

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install requests feedparser

      - name: Ejecutar script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python noticias.py

      - name: Guardar memoria en el repositorio
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add enviados.txt || true
          git commit -m "Actualizar memoria de noticias enviadas" || true
          git push
